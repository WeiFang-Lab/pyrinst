stages:
  - test

variables:
  CONDA_HOME: $INTERNAL_CONDA_HOME
  CONDA_ENV_NAME: $INTERNAL_CONDA_ENV

before_script:
  - source ${CONDA_HOME}/etc/profile.d/conda.sh
  - conda activate $CONDA_ENV_NAME
  - pip install --no-build-isolation -e .

unit_test:
  stage: test
  script:
    - pytest tests/unittest --ignore=tests/unittest/test_mace.py

release_smoke_test:
  stage: test
  before_script:
    - source ${CONDA_HOME}/etc/profile.d/conda.sh
    - conda activate $CONDA_ENV_NAME
  script:
    - bash tests/smoke/release_smoke_test.sh

